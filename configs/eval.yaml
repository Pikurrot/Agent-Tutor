dataset_path: data/eval/deep_learning_questions.json
output_dir: eval_runs
resume: true
model_path: Qwen/Qwen3-8B
limit: null

judge:
  model: gemini-2.5-flash-lite
  temperature: 0.0
  thinking_budget: 0
  # Omit system_instruction to use DEFAULT_JUDGE_SYSTEM_INSTRUCTION in evaluation.py

modes:
  agent:
    results_file: deep_learning_results.jsonl
    summary_file: summary_agent.json
  llm_context:
    results_file: deep_learning_llm_context.jsonl
    summary_file: summary_llm_context.json
    max_input_tokens: 28000
    max_new_tokens: 1024
    prompt_reserve_tokens: 1500
  llm_baseline:
    results_file: deep_learning_llm_baseline.jsonl
    summary_file: summary_llm_baseline.json
    max_new_tokens: 1024
  rag:
    results_file: deep_learning_rag.jsonl
    summary_file: summary_rag.json
    max_new_tokens: 1024
  conversation:
    results_file: deep_learning_conversation.jsonl
    summary_file: summary_conversation.json
    max_turns: 40           # safety cap (length otherwise unrestricted)
    give_up_after: 6        # hint to student: consider surrendering after N unhelpful turns
    k_values: [1, 3, 5, 10] # for Success@k / Telling@k
    student:
      model: gemini-2.5-flash
      temperature: 0.7
      thinking_budget: 0
